name: CI
on: {pull_request: {}, push: {}}
concurrency:
  group: ${{ github.head_ref || github.ref }}
  cancel-in-progress: true
permissions:
  contents: write
  packages: write
  issues: write
jobs:
  jobs:
    strategy:
      fail-fast: false
      matrix:
        target: [phplint, phpcs]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Save/restore composer cache directory dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist

      - name: PHP Lint
        run: |
          composer exec phplint -- --exclude=vendor/
        if: matrix.target == 'phplint'

      - name: PHP Code Sniff
        run: |
          composer exec phpcs -- --standard=PSR12 --ignore=vendor/ .
        if: matrix.target == 'phpcs'

  build-container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build container
        uses: infrabits/ci-pack@main
        with:
          image: ghcr.io/${{ github.repository }}:${{ github.sha }}
          use_builder: latest
          buildpack: heroku/php

      - name: Authenticate to ghcr.io
        run: |
          echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

      - name: Publish container
        shell: bash
        run: |
          docker push ghcr.io/${{ github.repository }}:${{ github.sha }}
