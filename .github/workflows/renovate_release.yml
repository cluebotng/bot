name: Create Release For Renovate
on: { push: { branches: [ 'main' ] } }
jobs:
  renovate-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: infrabits/ci-create-renovate-release@690d3582120fdb652786680c820a26aa006b1650 # main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    needs: [renovate-release]
    uses: ./.github/workflows/deploy.yml
    with:
      ref: 'refs/tags/${{ needs.renovate-release.outputs.tag_name }}'
    secrets: inherit
    if: needs.renovate-release.outputs.tag_name != ''
